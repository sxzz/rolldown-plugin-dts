name: Lock Closed Issues

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  action:
    if: github.repository == 'rolldown/tsdown'
    runs-on: ubuntu-latest
    steps:
      - uses: actions-cool/issues-helper@200c78641dbf33838311e5a1e0c31bbdb92d7cf0 # v3.8.0
        with:
          actions: lock-issues
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-state: closed
          inactive-day: 14
